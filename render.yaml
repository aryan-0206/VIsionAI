services:
  - type: web
    name: visionai
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --keep-alive 5 --chdir backend app:app"
    envVars:
      - key: YOLO_MODEL
        value: ../models/yolov8n.onnx
      - key: FLASK_DEBUG
        value: "0"
      - key: CORS_ORIGINS
        value: "*"
