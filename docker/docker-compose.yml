services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CORS_ORIGINS=*
      - YOLO_MODEL=/app/models/yolov8n.pt
    volumes:
      - ../uploads:/app/uploads
      - ../outputs:/app/outputs
      - ../models:/app/models

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
